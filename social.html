<!doctype html>

<html lang="en" class="no-js">

<head>
  <title>Alfredo Sequeida - Social</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous">
  <link rel="stylesheet" href="instagrambio.css" />
</head>

<body>

  <div class="container">
    <br />
    <!-------Row 1----->
    <div class="row justify-content-center">

      <div class="col-6 text-center">
        <a target="_blank" href="https://www.youtube.com/alfredosequeida">
          <div id="youtube" class="square">
            <div class="square-content">
              <i class="fab fa-youtube"></i>
            </div>
          </div>
        </a>
      </div>

      <div class="col-6 text-center">

        <a target="_blank" href="https://www.instagram.com/alfredosequeida/">
          <div id="instagram" class="square">
            <div class="square-content ">
              <i class="fab fa-instagram"></i>
            </div>
          </div>
        </a>
      </div>

    </div>

    <!-------Row 2----->


    <div class="row justify-content-center">

      <div class="col-6 text-center">
        <a target="_blank" href="https://snapchat.com/add/alfredosequeida">
          <div id="snapchat" class="square">
            <div class="square-content">
              <i class="fab fa-snapchat"></i>
            </div>
          </div>
        </a>
      </div>

      <div class="col-6 text-center">

        <a target="_blank" href="https://twitter.com/AlfredoSequeida">
          <div id="twitter" class="square">
            <div class="square-content ">
              <i class="fab fa-twitter"></i>
            </div>
          </div>
        </a>

      </div>

    </div>


    <!-------Row 3----->


    <div class="row justify-content-center">

      <div class="col-6 text-center">

        <a target="_blank" href="https://medium.com/@alfredosequeida">
          <div id="medium" class="square">
            <div class="square-content">
              <i class="fab fa-medium-m"></i>
            </div>
          </div>
        </a>

      </div>

      <div class="col-6 text-center">

        <div class="square">
          <div class="square-content ">
          </div>
        </div>

      </div>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js " integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo " crossorigin="anonymous "></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js " integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49 " crossorigin="anonymous "></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js " integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy " crossorigin="anonymous "></script>
</body>

</html>
